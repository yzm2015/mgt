<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>磁吸拆迁队 - 浏览器测试版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            background: #87CEEB;
            cursor: pointer;
        }

        #infoPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            max-width: 300px;
            display: none;
        }

        #infoPanel h3 {
            margin-bottom: 10px;
            color: #FFD700;
        }

        #infoPanel p {
            margin: 5px 0;
            line-height: 1.5;
        }

        #controlPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        #debugInfo {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00FF00;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="infoPanel">
            <h3>操作说明</h3>
            <p>🎮 <strong>控制方式：</strong></p>
            <p>1. 鼠标左键按住并移动 - 控制起重机左右移动</p>
            <p>2. 鼠标右键点击 - 激活磁铁</p>
            <p>3. 释放鼠标右键 - 释放物体</p>
            <p>4. 空格键 - 暂停/继续游戏</p>
            <p>5. R 键 - 重新开始当前关卡</p>
            <p>6. N 键 - 进入下一关</p>
        </div>
        <div id="controlPanel">
            <button class="btn" onclick="toggleInfo()">显示/隐藏说明</button>
            <button class="btn" onclick="toggleDebug()">显示/隐藏调试</button>
            <button class="btn" onclick="restartGame()">重新开始</button>
        </div>
        <div id="debugInfo"></div>
    </div>

    <script src="js/PhysicsSystem.js"></script>
    <script src="js/CraneController.js"></script>
    <script src="js/BuildingGenerator.js"></script>
    <script src="js/AudioManager.js"></script>
    <script src="js/game-browser.js"></script>
</body>
</html>
