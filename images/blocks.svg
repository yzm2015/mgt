<!-- 方块贴图 SVG 资源 -->
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300">
  <!-- 木材方块 -->
  <g id="wood-block">
    <rect x="10" y="10" width="80" height="80" fill="#DEB887" stroke="#8B4513" stroke-width="3"/>
    <line x1="10" y1="30" x2="90" y2="30" stroke="#8B4513" stroke-width="1"/>
    <line x1="10" y1="50" x2="90" y2="50" stroke="#8B4513" stroke-width="1"/>
    <line x1="10" y1="70" x2="90" y2="70" stroke="#8B4513" stroke-width="1"/>
    <circle cx="30" cy="30" r="3" fill="#8B4513"/>
    <circle cx="50" cy="50" r="3" fill="#8B4513"/>
    <circle cx="70" cy="70" r="3" fill="#8B4513"/>
  </g>
  
  <!-- 砖石块方块 -->
  <g id="brick-block">
    <rect x="110" y="10" width="80" height="80" fill="#FF6347" stroke="#8B0000" stroke-width="3"/>
    <path d="M 110 30 L 190 30 M 130 50 L 190 50 M 110 70 L 170 70" 
          stroke="#8B0000" stroke-width="2" fill="none"/>
    <path d="M 110 30 L 130 50 L 110 70 M 170 30 L 190 50 L 170 70" 
          stroke="#8B0000" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  
  <!-- 钢材方块 -->
  <g id="steel-block">
    <defs>
      <linearGradient id="steel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#A9A9A9;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:#696969;stop-opacity:1"/>
      </linearGradient>
    </defs>
    <rect x="210" y="10" width="80" height="80" fill="url(#steel-grad)" stroke="#333333" stroke-width="3"/>
    <rect x="215" y="15" width="70" height="70" fill="none" stroke="#808080" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- 冰块方块 -->
  <g id="ice-block">
    <defs>
      <linearGradient id="ice-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#E0FFFF;stop-opacity:0.8"/>
        <stop offset="100%" style="stop-color:#ADD8E6;stop-opacity:0.6"/>
      </linearGradient>
    </defs>
    <rect x="10" y="110" width="80" height="80" fill="url(#ice-grad)" stroke="#4682B4" stroke-width="3"/>
    <path d="M 30 130 L 50 150 L 70 130 M 40 170 L 60 150" 
          stroke="#4682B4" stroke-width="2" fill="none" opacity="0.7"/>
  </g>
  
  <!-- 橡胶块方块 -->
  <g id="rubber-block">
    <ellipse cx="150" cy="150" rx="40" ry="40" fill="#FF69B4" stroke="#C71585" stroke-width="3"/>
    <ellipse cx="150" cy="150" rx="30" ry="30" fill="none" stroke="#FF69B4" stroke-width="1" opacity="0.5"/>
    <circle cx="150" cy="150" r="10" fill="#C71585" opacity="0.3"/>
  </g>
  
  <!-- TNT 炸药方块 -->
  <g id="tnt-block">
    <rect x="210" y="110" width="80" height="80" fill="#FF4500" stroke="#8B0000" stroke-width="3"/>
    <rect x="220" y="120" width="60" height="60" fill="#FF6347" stroke="#8B0000" stroke-width="1"/>
    <text x="250" y="155" font-family="Arial" font-size="14" font-weight="bold" fill="#FFFF00" text-anchor="middle">TNT</text>
    <path d="M 250 180 L 250 200 M 245 185 L 250 180 L 255 185" 
          stroke="#8B4513" stroke-width="2" fill="none"/>
  </g>
</svg>
